# Video Processing Configuration

# Segmentation settings
segmentation:
  chunk_duration: 10  # seconds per chunk
  min_chunk_duration: 5
  max_chunk_duration: 30

# Processing settings
processing:
  codec: libx264
  crf: 23  # Constant Rate Factor (quality: 0-51, lower is better)
  preset: medium  # ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow
  scale: null  # e.g., "1280:720" for 720p, null for original
  bitrate: null  # e.g., "2M", null for auto

# Storage settings
storage:
  mode: local  # local or remote (nfs, s3)
  base_path: ./storage
  input_dir: input
  chunks_dir: chunks
  output_dir: output
  temp_dir: temp

# Worker settings
worker:
  max_retries: 3
  timeout: 300  # seconds
  heartbeat_interval: 5  # seconds

# Master settings
master:
  port: 5000
  queue_check_interval: 1  # seconds
  worker_timeout: 60  # seconds before marking worker as dead

# Scheduling strategies
scheduling:
  default_strategy: dynamic  # single, static, dynamic
  enable_work_stealing: false  # Future feature
  enable_adaptive_chunking: false  # Future feature

# Logging
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  log_dir: logs
  enable_file_logging: true
  enable_console_logging: true

# Evaluation
evaluation:
  metrics_dir: metrics
  enable_profiling: true
  track_worker_utilization: true
