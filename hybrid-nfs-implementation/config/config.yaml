# Hybrid NFS+SSH Video Processing Configuration

# NFS shared directory (for Jetstream deployment)
nfs_base_dir: "/home/ubuntu/nfs_shared"

# SSH configuration
ssh_user: "exouser"
ssh_key: "~/.ssh/id_rsa"

# Worker nodes
workers:
  - host: "149.165.169.199"
  - host: "149.165.169.58"
  - host: "149.165.169.92"
  - host: "149.165.172.111"

# Video processing settings
segment_duration: 5
codec: "libx264"
bitrate: "2M"
preset: "medium"
max_retries: 2
timeout: 300
